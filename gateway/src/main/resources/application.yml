spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  application:
    name: gateway

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: ${USERS_SERVICE_URL}
          predicates:
            - Path=/api/users/**,/api/profile/**

        - id: users-swagger
          uri: ${USERS_SERVICE_URL}
          predicates:
            - Path=/users/v3/api-docs
          filters:
            - SetPath=/v3/api-docs

        - id: startup-service
          uri: ${STARTUP_SERVICE_URL}
          predicates:
            - Path=/api/startups/**,/api/documents/**

        - id: startup-swagger
          uri: ${STARTUP_SERVICE_URL}
          predicates:
            - Path=/startup/v3/api-docs
          filters:
            - SetPath=/v3/api-docs


        - id: investor-service
          uri: ${INVESTOR_SERVICE_URL}
          predicates:
            - Path=/api/investor/**,/api/investment/**,/api/investors/preferences/**

        - id: investor-swagger
          uri: ${INVESTOR_SERVICE_URL}
          predicates:
            - Path=/investor/v3/api-docs
          filters:
            - SetPath=/v3/api-docs

springdoc:
  api-docs:
    enabled: true

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    disable-swagger-default-url: true

    urls:
      - name: Users Service
        url: /users/v3/api-docs

      - name: Startup Service
        url: /startup/v3/api-docs

      - name: Investor Service
        url: /investor/v3/api-docs

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
