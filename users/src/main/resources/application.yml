#spring.application.name=users

spring:
  application:
    name: users

  datasource:
    url: jdbc:postgresql://localhost:5432/fundbridge
    username: ajay
    password: ajay
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs


server:
  port: 8081
  forward-headers-strategy: framework